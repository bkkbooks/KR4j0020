body:
  text: 石林詞宋葉夢得撰賀新郎或刻李玉睡起流鶯語掩蒼苔房櫳向晚亂紅無數吹盡殘花無人見惟有垂楊自舞漸暖靄初回輕暑寶扇重尋明月影暗塵侵上有乘鸞女驚舊恨遽如許江南夢斷橫江渚浪黏天葡萄漲緑半空煙雨無限樓前滄波意誰採蘋花寄取但悵望蘭舟容與萬里雲帆何時到送孤鴻目斷千山阻誰為我唱金縷水調歌頭濠州觀魚臺作渺渺楚天濶秋水去無窮兩崕不辨牛馬輕浪舞回風獨倚髙樓一笑圉圉遊魚來往還戲此波中危檻對千里落日照晴空子非我安知我意真同鵬飛鵾化何有滄海漫沖融堪笑磻溪遺老白首直鈎溪畔嵗晚忽衰翁功業竟安在徒自兆非熊又九月望日與客習射西園余病不能射霜降碧天靜秋事促西風寒聲隱地初聽中夜入梧桐起瞰髙城四顧寥落關河千里一醉與君同疉鼓閙清曉飛騎引雕弓嵗將晚客爭笑問衰翁平生豪氣安在走馬為誰雄何似當筵虎士揮手絃聲響處雙鴈落遙空老矣真堪愧回首望雲中又送八舅朝請江海渺千里飄蕩歎流年等間匹馬相過乘興却翛然十載悲歡如夢撫掌驚呼相語往事盡飛煙此會真難偶此醉且留連酒方半誰輕便動離絃我歌未闋公去明日復山川空有髙城危檻縹眇當筵清唱餘響落尊前細雨黃花後飛鴈落遙天又湖光亭落成修睂掃遙碧清鏡走回流堤外柳煙深淺碧瓦起朱樓分付平雲千里包卷騷人遺思春色入簾鈎桃李盡無語波影動蘭舟念謝公平生志在滄洲登臨漫懷風景佳處每難酬却歎從來賢士如我與公多矣名迹竟誰留惟有尊前醉何必問消憂又次韻叔父寺丞林德祖和休官詠懷今古幾流轉身世兩奔忙那知一丘一壑何處不堪藏須信超然物外容易扁舟相踵分占水雲鄉雅志真無負來日故應長問騏驥空矯首為誰昻冥鴻天際塵事分付一輕芒認取騷人生此但有輕篷短楫多製芰荷裳一笑陶彭澤千載賀知章又癸丑中秋河漢只平野香霧捲西風倚空千嶂橫起銀闕正當中常恨年年此夜醉倒歌呼誰和何事與君同莫恨嵗華晚容易感梧桐攬清影君試與問天公遙知玉斧初斫重到廣寒宫付與孤光千里不遣微雲點綴為我洗長空老去狂猶在應未笑衰翁又秋色漸將晚霜信報黃花小窗低戶深映微路繞敧斜為問山公何事坐看流年輕度拚却鬢雙華徙倚望滄海天淨水明霞念平昔空飄蕩遍天涯歸來三徑重掃松竹本吾家却恨悲風時起冉冉雲間新鴈邊馬怨胡笳誰似東山老談笑淨胡沙八聲甘州壽陽樓八公山作故都迷岸草望長淮依然繞孤城想烏衣年少芝蘭秀發戈戟雲橫坐看驕兵南渡沸浪駭奔鯨轉眄東流水一顧功成千載八公山下尚斷崕草木遙擁崢嶸漫雲濤吞吐無處問豪英信勞生空成今古笑我來何事愴遺情東山老可堪嵗晚獨聽桓箏又正月二日作是嵗閏正月十四日才立春又新正過了問東風消息幾時來笑春工多思留連底事猶未輕回應為瑤刀裁剪容易惜花開試向湖邊望幾處寒梅好是緑莎新徑剩安排芳意特地重栽便從今追賞莫遣暫停杯有千株深紅淺白倩緩歌急管特相催憑看取暖煙細靄先到髙臺又問浮家泛宅自玄真去後有誰來漫煙波千頃雲峰倒影空翠成堆可是溪山無主佳處且徘徊莫雨捲晴野落照天開老去餘生江海伴逺公香火猶有宗雷便何妨元亮攜酒間相陪寄清談芒鞋笻杖更盡驅風月入尊罍江村路我歌君和莫棹船回又甲辰承詔知止亭初畢工劉無言相過寄知還倦鳥對飛雲無心兩難齊漫飄然欲去悠然且止依舊山西十畝荒園未遍趂雨却鋤犁敢忘鄰翁約有酒同攜況是巖前新建帶小軒橫絶松桂成蹊試憑髙東望雲海與天低送滄波浮空千里照斷霞明滅捲晴霓君休笑此生心事老更沈迷念奴嬌南歸渡揚子作雜用淵明語故山漸近念淵明歸意翛然誰論歸去來兮秋已老松菊三徑猶存稚子歡迎飄飄風袂依約舊衡門琴書蕭散更欣有酒盈尊惆悵萍梗無根天涯行已遍空負田園去矣何之窗戶小容膝聊倚南軒倦鳥知還晚雲遙映山氣欲黃昏此還真意故應欲辨忘言又中秋燕客有懷壬午嵗吳江長橋洞庭波冷望冰輪初轉滄海沈沈萬頃孤光雲陳卷長笛吹破層隂洶湧三江銀濤無際遙帶五湖深酒闌歌罷至今鼉怒龍吟回首江海平生漂流容易散佳會難尋縹眇髙城風露爽獨倚危闌重臨醉倒清尊姮娥應笑猶有向來心廣寒宫殿為豫聊借瓊林或刻百字令字句迥異又雲峰橫起障吳關三面真成尤物倒卷回潮目盡處秋水黏天無壁緑鬢人歸如今雖在空有千莖雪追尋如夢漫餘詩句猶傑聞道尊酒登臨孫郎終古恨長歌時發萬里雲屯瓜步晚落日旌旗明滅鼓吹風髙畫船遙想一笑吞窮髮當時曽照更誰重問山月滿庭芳雨後極目亭寄示張敏仲程致道麥隴如雲清風吹破夜來疏雨才晴滿川煙草殘照落微明縹眇危欄曲檻遙天盡日腳初平青林外參差暝靄縈帶逺山橫孤城春雨過緑隂是處時有鶯聲問落絮遊絲畢竟何成信步蒼苔繞遍真堪付間客間行微吟罷重回皓首江海渺無情又張敏叔程致道和示復用韻寄酬楓落吳江扁舟搖蕩莫山斜照催晴此心長在秋水共澄明底事經年易拚驚遺恨悄悄難平臨風處佳人萬里霜笛與誰橫長城誰敢犯知君五字元有詩聲笑茅舍何時歸此真成絲鬢朱顔老盡柴居在行即終行聊相待狂唱醉舞雖老未忘情又次韻答蔡州王道濟大夫見寄一曲離歌煙林人去馬頭微雪新晴隔年光景回首近清明斷送殘花又老春波靜湖水初平誰重到雕欄盡日遙想畫橋橫高城凝望久何人為我重唱餘聲問桃李更有幾處隂成老去從遊似夢尊前事空有經行猶能記殷勤寄語多謝故人情滿江紅重陽賞菊時余巳除代一朵黃花先催報秋歸消息滿芳枝凝露為誰裝飾便向尊前拚醉倒古今同是東籬側問何須特地賦歸來拋彭澤回首去年時節開口笑真難得使君今那更自成行客霜鬢不辭重插滿他年此會何人憶記多情曾伴小闌千親攀摘又雪後郊原煙林外梅花初拆春欲半猶自探春消息一眼平蕪看不盡夜來小雨催新碧笑去年攜酒折花人花應識蘭舟漾城南陌雲影淡天容窄繞風漪十頃暖浮晴色恰是槎頭收釣處坐中仍有江南客問如何兩槳下苕溪吞雲澤應天長自潁上縣欲還具作松陵秋已老正柳岸田家酒醅初熟鱸膾蓴羮萬里水天相續扁舟波浩渺寄一葉莫濤吞沃青篛笠西塞山前自翻新曲來往未應足便細雨斜風有誰拘束陶寫中年何待更須絲竹鴟夷千古意算入手比來尤速最好是千點雲峰半篙澄渌定風波與幹譽才卿步西園始見青梅破萼初驚一點紅又看青子映簾櫳冰雪肌膚誰復見清淺尚餘疏影照晴空惆悵年年桃李伴眻斷祇應芳信負東風待得微黃春亦莫煙雨半和飛絮作濛濛又渺渺空波下夕陽睡痕初破水風涼過雨歸雲留不住何處逺村煙樹半微茫莫笑經年人老矣歸計得遲留處也何妨老子興來殊不淺簾捲更邀明月坐胡床又千步長虹跨碧流兩山浮影轉螭頭付與詩人都總領風景更逢仙客下瀛洲嫋嫋涼風吹汗漫平岸遙空新卷絳河收却怪姮娥真好事須記探支明月作中秋又斜漢初看素月流坐驚金餅出雲頭華髮蕭然吹素領光景何妨分付屬滄洲莫待霜花飄爛漫蘋岸更慿佳句盡拘收解與破除消萬事猶記一尊同得二年秋此魯卿見和復答之江城子原刻六闋考銀濤無際卷蓬瀛是東坡詞刪去碧潭浮影蘸紅旗日初遲漾晴漪我欲尋芳先遣報春知盡放百花連夜發休更待曉風吹滿攜尊酒弄繁枝與佳期伴羣嬉猶有邦人爭唱醉翁詞應笑今年狂太守能痛飲似當時又大雪與客登極目亭跰躚飛舞半空來曉風催巧縈回野曠天遙回望興悠哉欲問玉京知逺近試攜手上髙臺雲濤無際卷崔嵬斂浮埃照瓊瑰點綴林花真箇是多才説與化工留妙手休盡放一時開又再送盧倅芙蓉開過雨初晴曲池平畫橋橫耿耿銀河遙下蘸空明一舸吳松歸未得聊共住小蓬瀛問君何事引前旌趣歸程背髙城魚鳥三年誰道總無情試遣他年歌此曲應尚記别時聲又登小吳臺小飲生涯何有但青山小溪灣轉潺湲投老歸來終寄此山間茅舍半敧風雨橫荒徑晚亂榛菅強扶衰病上巉顛水雲間伴躋攀湖海蒼茫千里在吳關漫有一杯聊自醉休更問鬢毛斑又次韻葛魯卿上元甘泉祠殿漢離宫五雲中渺難窮永漏通宵壺矢轉金銅曽從鈞天知帝所孤鶴老寄遼東強扶衰病步龍鍾雪花濛打窗風一點青燈惆悵伴南宫唯有使君同此恨丹鳳缺水雲重竹馬兒與君記平山堂前細栁幾回同挽又征帆夜落危檻依舊遙臨雲巘自笑來往匆匆朱顔漸改故人俱逺橫笛想遺聲但寒松千丈傾崕蒼蘚世事終何巳田隂縱在嵗隂仍晚嵇康老來尤懶只要蓴羮菰飯却欲便買茅廬短篷輕楫尊酒猶能辦君能過我水雲聊為伴浣溪沙重陽一日極目亭小雨初回昨夜涼繞籬新菊已催黃碧空無際卷蒼茫千里斷鴻供遠目十年芳草挂愁腸緩歌聊與送瑤觴又睡粉輕消露臉新醉紅初破玉肌勻尊前留得兩州春剩挽雕盤敧醉帽重催飛騎走紅塵十年蘭􅉅笑騷人又送盧倅荷葉荷花水底天玉壺冰酒釀新泉一歡聊復記他年我亦故山歸去客與君分手暫流連佳人休唱好因緣又意在亭休笑山翁不住山二年偷向此中間歸來贏得鬢毛斑甕底新醅供酩酊城頭曲檻俯淙潺山翁元在此山間又許公堂席上次韻王幼安絳蠟燒殘夜未分寶箏聲暖拍初勻斗樞光照坐生春便恐賜還歸衮繡莫辭揮翰落煙雲鳳城西去斷離魂又用前韻再答幼安緑野歌歡喜見分驟驚和氣曉來勻妙歌誰敢和陽春梅蕊舊年迎臘雪月華今夜破寒雲獨醒爭笑楚人魂又次韻王幼安曹存之園亭席上物外光隂不屬春斷留風景伴佳辰醉歸誰管斷腸人柳絮尚飄庭下雪梨花空作夢中雲竹間籬落水邊門又與魯卿酌别席上次韻千古風流詠白蘋二千歌笑擁朱輪翩翩却憶上林春劒履便應陪北闕袴襦那更假西人玉堂金殿要詞臣永遇樂寄懷張敏叔程致道蘋芷芳洲故人回首雲海何處五畝荒田殷勤問我歸此真成否洞庭波冷秋風嫋嫋木葉亂隨風舞記扁舟橫斜載月目極莫濤煙渚傳聲試問垂虹千頃蘭棹有誰重駐雪濺雷翻潮頭過後帆影敧前浦此中髙興何人解道天也未應輕付且留取千鍾痛飲與君共賦又蔡州移守潁昌與客會别臨芳觀席上或刻蘇子瞻天末山橫半空簫鼓樓觀髙起指點裁成東風滿院總是新桃李綸巾羽扇一尊飲罷目送斷鴻千里攬清歌餘音不斷縹眇尚縈流水年來自笑無情何事猶有多情遺思緑鬢朱顔匆匆拚了却記花前醉明年春到重尋幽夢應在亂鶯聲裏拍闌干斜陽轉處有誰共倚臨江仙聞道今年春信早梅花不怕餘寒憑君先近向南看香苞開遍未莫待北枝殘腸斷隴頭他日恨江南幾驛征鞍一杯聊與盡餘歡風情何似我老去未應闌又雪後寄周十夢裏江南渾不記祇今幽戶難忘夜來急雪繞東堂竹窗松徑裏何處問歸艎甕底新醅應已熟一尊知與誰嘗會須雄筆卷蒼茫雲濤聲隱戶瓊玉照頽牆又與客湖上飲歸不見跳魚翻曲港湖邊特地經過蕭蕭疏雨亂風荷微雲吹盡散明月墮平波白酒一杯還徑醉歸來散髮婆娑無人能唱採菱歌小軒敧枕簟簷影挂星河又送章長卿還姑蘇兼寄程致道碧瓦新霜侵曉夢黃花已過清秋風帆何處挂扁舟故人歸欲盡斜日更回頭樂圃橋邊煩借問有人高臥江樓寄聲聊為訴離憂桂叢應已老何事久淹留又席上次韻韓文若聞道安車來過我百花未敢飄零疾催絃管送杯行五朝瞻舊老揮麈聽風生鳳詔逺從天上落高堂燕喜初醒莫言白髮減風情此時誰得似飲罷却精神又朝以道見和答韓文若之句復答之二首三月鶯花都過了曉來雪片猶零嵩陽居士記行行西湖初水滿遙想縠紋生欲為海棠傳信息如今底事長醒不應髙臥頓忘情留春春不住老眼若為明又唱徹陽關分别袂佳人粉淚空零請君重作醉歌行一歡須痛飲回首念平生却怪老來風味減半酣易逐愁醒因花那更賦間情鬢毛今爾耳空笑老淵明又次韻洪思成湖上瀲灔湖光供一笑未須醉日論千將軍曽記舊臨邊野塘新水漫煙岸酒如船却怪情多春又老回腸易逐愁煎何如旌斾鬱相連凱歌歸玉帳錦帽碧油前又同王幼安洪思成過曾存之園亭學士園林人不到傳聲欲問江梅曲欄清淺小池臺已知春意近為我著詩催急管行觴圍舞袖故人坐上三台幼安與存之少相從此歡此宴固難陪不辭同二老倒載習池回又次韻答幼安思成存之席上梅花不與羣芳爭豔豔化工自許寒梅一枝臨晚照歌臺眼明渾未見絃管莫驚催記取劉郎歸去路千年應話天台酒闌不惜更重陪夜寒衣袂薄猶有暗香回又晚之湖上三日疾風吹浩蕩緑蕪未遍平沙約回殘影射明霞水光遙泛坐煙柳互敧斜霜鬢不堪春點檢留連又見芳華一枝重插去年花此身江海夢何處定吾家又熙春臺與王取道賀方回曾公衮會别自笑天涯無定準飄然到處遲留興闌却上五湖舟鱸蓴新有味碧樹已驚秋臺上微涼初過雨一尊聊記同遊寄聲時為到滄洲遙知敧枕處萬壑看交流又次葛魯卿法華山曲水勸酒山半飛泉鳴玉珮回波倒卷粼粼解巾聊濯十年塵青山應却怪此段久無人行樂應須賀太守風光過眼逡巡不辭常作坐中賓只愁花解笑衰鬢不宜春又西園右春亭新成手種千株桃李樹參差半已成隂主人何事馬駸駸二年江海路空負種花心試向中間安小檻此還長要追尋却驚搖落動悲吟春歸知早晚為我變層林又南山絶頂作臺新成與客賞月絶頂參差千嶂外不知空水相浮下臨湖海見三州落霞橫莫景為客小遲留卷盡微雲天更濶此行不負清秋忽驚河漢近人流青霄元有路一笑倚瓊樓又明日與客復登臺再用前韻一醉三年那易得應須大白同浮已知絶景是吾州嫦娥仍有意更肯為人留萬籟無聲遙夜永人間未識高秋從來我客盡風流故知憐老子尤勝在南樓又明日小雨已而風大作復晚晴遂見月與客再登卷地驚風吹雨過却堪香霧輕浮遙知清影遍南州萬峰橫玉立誰為此山留邂逅一歡須共惜年年長記今秋平生江海恨飄流元龍真老矣無意臥高樓又詔芳亭贈坐客一醉年年今夜月酒船聊更同浮恨無羯鼓打梁州遺聲猶好在風景一時留老去狂歌君勿笑巳拚雙鬢成秋會須擊節泝中流一聲雲外笛驚看水明樓世傳梁州西梁府初進此曲會明皇遊月宮還記霓裳之曲適相近因作霓裳羽衣曲以梁州名之是夕約諸君明夜泛舟故有梁州中流之句又草草一年真過夢此生不恨萍浮且令從事到青州巳能從辟穀那更話封留好月尚尋當日約故人何啻三秋援琴欲寫竹間流此聲誰解聽吟上仲宣樓虞美人雨後同幹譽才卿置酒來禽花下作或刻蘇子瞻或刻周美成落花巳作風前舞又送黃昏雨曉來庭院半殘紅惟有遊絲千丈罥晴空殷勤花下同攜手更盡杯中酒美人不用斂蛾睂我亦多情無奈酒闌時又極目亭望西山翻翻翠葉梧桐老雨後涼生早葛巾藜杖正關情莫遣繁蟬容易作秋聲遙空不盡青天去一抹殘霞莫病餘無力厭躋攀為寄曲欄幽意到西山又上已席上一聲鶗鴂催春晚芳草連空逺年年餘恨怨殘紅可是無情容易愛隨風茂林修竹山隂道千載誰重到半湖流水夕陽前猶有一觴一詠似當年又同蔡寬夫置酒王仲弓出歌人聲甚妙東風一夜催春到楊柳朝來好莫辭尊酒重攜持老去情懷能有幾人知鳳臺園裏新詩伴不用相追喚一聲清唱落瓊巵千頃西風煙浪晚雲遲又數聲微雨風驚曉燭影敧殘照客愁不奈五更寒明日梨花開盡有誰看追尋猶記清明近為向花前問東風正使解欺儂不道花應有恨也匆匆又寒食泛舟平波漲緑春堤滿渡口人歸晚短篷輕楫費追尋始信十年歸夢是如今故人回望高陽里遙想車連騎尊前點檢舊年春應有海棠猶記插花人又逋堂睡起同吹洞簫緑隂初過黃梅雨隔葉聞鶯語睡餘誰遣夕陽斜時有微涼風動入窗紗天涯走遍終何有白髮空搔首未須錦瑟怨年華為寄一聲長笛怨梅花又贈蔡子因梅花落盡桃花小春事餘多少新亭風景尚依然白髮故人相遇且留連家山應在層林外悵望花前醉半天煙霧尚連空笑取扁舟歸去與君同減字木蘭花黃花暫老秋色欲歸還草草花下前期花老空歌鵲踏枝狂酲易醒不似舊時長酩酊玉簟新涼數盡更籌夜更長又雪中賞牡丹前村夜半每為江梅腸欲斷淺紫深紅誰信漫天雪裏逢醉頭扶起宿酒闌干猶困倚便莫催殘明日東風為掃看又王幼安見和前韻復用韻答之粉消粧半一曲陽春歌始斷便覺香紅十倍光華昔未逢楊花吹起猶自風前相枕倚莫恨春殘留取新詩仔細看木蘭花二月二十六日晚雨集客湖上花殘却似春留戀幾日餘香吹酒面溼煙不隔栁條青小雨池塘初有燕波光縱使明如練可奈落紅紛似霰解將心事訴東風只有啼鶯千種囀點絳唇晚出山榭春初植蘭榭側近復生紫芝十一本髙柳蕭蕭睡餘已覺西風徑小窗人靜淅瀝生秋聽底事多情欲與流年競殘雲暝墜巾慵整獨立芝蘭徑又紹興乙卯登絶頂水亭縹眇危亭笑談獨在千峰上與誰同賞萬里橫煙浪老去情懷猶作天涯想空惆悵少年豪放莫學衰翁樣又丙辰八月二十七日雨中與何彥亨小飲山上飛泉漫流水下知何處亂雲無數留得幽人住深閉柴門聽盡空簷雨秋還莫小窗低戶唯有寒蛩語鷓鴣天與幹譽賞梅不怕微霜點玉肌恨無流水照冰姿與君著意從頭看初見今年第一枝人醉後雪消時江南春色寄來遲使君盡是花前客莫怪殷勤為賦詩又元夕次韻幹譽夾路行歌盡落梅篆煙香細裊寒灰雲移碧海三山近月破中天九陌開追樂事惜多才車聲遙聽走隨雷十年夢斷鈞天奏猶記流霞醉後杯又雨後湖上看落花小雨初收報夕陽歸雲欲渡轉橫塘空回雨蓋翻新影不見瓊肌洗暗香追落景弄微涼尚餘殘淚浥空床祇應自有東風恨長遣啼痕破晚粧又續採蓮曲曉日初開露未晞夕陽輕散雨還微暗搖綿霧遊鯈戲斜映紅雲屬玉飛情脈脈恨依依沙邊空見棹船歸何人解舞新聲曲一試纖腰六尺圍又次韻魯卿大錢觀大湖蘭􅉅空悲楚客秋旌旗誰見使君遊凌雲不隔三山路破浪聊憑萬里舟公欲去尚能留杯行到手未宜休新詩無物堪倫比願探珊瑚出寶鈎又與魯卿晚雨泛舟出西郭用煙波定韻天末殘霞卷莫紅波間時見沒鳬翁斜風細雨家何在老矣生涯盡箇中惟此意與公同未須持酒祝牛宫傍人不解青蓑意猶説黃金寶帶重又一曲青山映小池緑荷隂盡雨離披何人解識秋堪美莫為悲秋浪賦詩攜濁酒繞東籬菊殘猶有傲霜枝一年好景君須記正是橙黃橘緑時梁范堅常謂欣成惜敗者物之情秋為萬物成功之時宋玉作悲秋非是乃作美秋賦云水龍吟西湖燕客作對花常欲流春恨春故遣花飛早晚來雨過緑隂新處幾番芳草一片飄時已知消減滿庭誰掃料多情也似愁人易感先催趂朱顔老猶有清明未過但狂風匆匆難保酒醒夢斷年年此恨不禁煙草只恐春缺應留芳信與花爭好有姚黃一朵殷勤付與送金杯倒又八月十三日與張少逸遊道場山放舟中流命工吹笛舟尾迎月歸作柂樓橫笛孤吹莫雲散盡天如水人間底事忽驚飛墮冰壺千里玉樹風清漫波搖卷與空無際謝嫦娥此夜殷勤偏照知人在千山裏常恨孤光易轉仗多情使君料理缺一杯起舞曲終須記但尊前有酒常追舊事拚年年醉千秋嵗次韻兵曹席孟惠廨中千葉黃梅曉煙溪畔曽記東風面化工更與重裁剪額黃明豔粉不共妖紅軟凝露臉多情正是當時見誰向滄波岸特地移間館情一縷愁千點煩君搜妙語為我催清燕須細看紛紛亂蕊空凡艷又小雨達旦東齋獨宿不能寐有懷松江舊遊雨聲蕭瑟初到梧桐響人不寐秋聲爽低簷燈暗淡畫幕風來往誰共賞依稀記得船篷上拍岸浮輕浪水濶菰蒲長向别浦收橫網緑蓑衝暝色艇子搖雙槳君莫忘此情猶是當時唱驀山溪百花洲席上次韻司録董庠一年春事常恨風和雨趂取未殘時醉花前春應相許山翁倒載日莫習池回問東風春知否莫道空歸去滿城歌吹也似春和豫爭笑使君狂占風光不教飛絮明朝酒醒滿地落殘紅唱新詞追好景猶有君收聚清平樂水空相映淡碧涵千頃素練不收寒玉鏡影落階無影纖纖與捧金杯暗香逐舞徘徊雪盡玉容開遍東風不管寒梅雨中花慢寒食前一日小雨牡丹巳將開與客置酒座中戲作痛飲狂歌百計強留風光無奈春去也應知相賞未忍相違卷地風驚爭催春莫雨頓回寒威對黃昏蕭瑟冰膚洗盡猶覆霞衣多情斷了為花狂惱故飄萬點霏微低粉面粧臺酒散淚顆頻揮可是盈盈有意祇應真惜分飛拚令吹盡明朝酒醒忍對紅稀南鄉子池亭新成晚步淺碧蘸鱗鱗照眼全無一點塵百草千花都過了初新翠竹髙槐不占春歌嘯墮綸巾午醉醒來尚欠伸待得月明歸去也青蘋更有涼風解送人又自後圃晚步湖上小院雨新晴初聽黃鸝第一聲滿地緑隂人不到盈盈一點孤花尚有情却傍水邊行葉底跳魚浪自驚日莫小舟何處去斜橫衝破浪痕久未平又癸卯種梅於西巖地瘦難立石間無花今嵗十一月輒先開數枝喜而為賦山畔小池臺曽記幽人著意栽亂石參差春至晚徘徊素景衝寒却自開絶絶照瓊瑰孤負芳心巧剪裁應恐練裙驚縞夜殘杯且放疏枝待我來卜算子鳳凰亭納涼新月挂林梢暗水鳴枯沼時見疏星落畫簷幾點流螢小歸意已無多故作連環繞欲寄新聲問採蓮水濶煙波渺又並澗頃種木芙蓉九目旦盛開曉雨洗新粧豔豔驚衰眼不趂東風取次開待得清霜晚曲港照回流影亂微波淺作態低昻好自持水濶煙波遠菩薩蠻湖光亭晚集平波不盡蒹葭逺清霜半落沙痕淺煙樹晚微茫孤鴻下夕陽梅花消息近試向南枝問記得水邊春江南别後人蝶戀花薄雪消時春已半踏遍蒼苔手挽花枝看一縷遊絲牽不斷多情更覺蜂兒亂盡日平波回逺岸倒影浮光却記冰初泮酒力無多吹易散餘寒向晚風驚幔醉蓬萊楚州上巳懷許下西湖寄曽在之王仲弓韓文表問東風何事斷送殘紅便拚歸去牢落征途笑行人羇旅一曲陽關斷雲殘靄做渭城朝雨欲寄離愁緑隂千轉黃鸝空語遙想湖邊浪搖空翠絃管風髙亂花飛絮曲水流觴有山公行處翠袖朱闌故人應也弄畫船煙浦會寫相思尊前為我重翻新句南歌子是日微雨過午而霽晚遂月出次劉無言韻雨惜山容斂雲矜棹影開忽看霽色射林隈為問明亭清影為誰來盡洗歸時路重傾醉後杯未應霜雪遽相催留得佳期猶在共徘徊採桑子冬至日與許幹譽章幾道飯績善晚歸雪作因留小飲山蹊小路歸來晚莫雪繽紛尊酒殷勤邂逅相從只有君全家住處無人到元在重雲此景誰分萬玉參差更作羣石林詞
