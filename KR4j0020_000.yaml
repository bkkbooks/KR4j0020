body:
  text: 提要石林詞詞曲類一詞集之屬臣等謹案石林詞一卷宋葉夢得撰夢得有春秋傳巳著録是編乃其詞集陳振孫書録解題作一卷與今本同别本載關注序稱其兄聖功元符中為鎮江掾夢得為丹徒尉得其小詞為多味其詞婉麗有溫李之風晚嵗落其華而實之能於簡淡中時出雄傑合處不減靖節東坡云云考倚聲一道去古詩頗逺集中亦惟念奴嬌故山漸近一首雜用陶潛之語不得謂之似陶注所擬殊為不類至於雲峰橫起一首全仿蘇軾大江東去並即參用其韻又鷓鴣天一曲青山後闋且直用軾詩語足成是以舊刻頗有與東坡詞彼此混入者則注謂夢得近於蘇軾其說不誣夢得著石林詩話主持王安石之學而隂抑蘇黃頗乖正論乃其為詞則又挹蘇軾之餘汲所謂是非之心有終不可澌滅者耶卷首賀新郎一首毛晉注或刻李玉考王楙野客叢書曰章茂深嘗得其婦翁所書賀新郎詞首曰睡起啼鶯語章疑其誤頗詰之石林曰老夫常得之矣流鶯不解語啼鶯解語見禽經云云則確為夢得之作晉蓋未核又野客叢書所記正謂此句作啼鶯語故章冲疑啼字語字相雜此本乃改為流鶯與王楙所記全然抵格知毛晉疏於考證妄改古書者多矣丹陽詞詞曲類一詞集之屬臣等謹案丹陽詞一卷宋葛勝仲撰勝仲有丹陽集八十卷傳本久佚今巳於永樂大典中裒輯成帙其詞則馬氏經籍考别載一本此為毛晉所刻蓋其單行之本也勝仲與葉夢得酬唱頗多而品格亦復相埒惟葉詞中有鷓鴣天次魯卿韻觀太湖一闋此卷內未見原唱而此卷有定風波燕駱駝橋次少藴韻二闋葉詞內亦未見非當時有所刋削即傳寫佚脫至浣溪沙三首在夢得詞以為次魯卿韻在此卷又以為和少藴韻則兩者必有一訛不可得而復考矣其江城子後闋押翁字韻亦可證葉詞復押宫字之誤瑞鷓鴣生辰一詞獨用仄韻諸家皆無是體據調當當改木蘭花至於字句訛缺凡永樂大典所載者如鷓鴣天第一首後闋歡華本作歡娛第二首後闋紅囊本作紅裳西江月第二首後闋縈塗本作榮塗驀山溪第一首前闋裋服本作袨服摸名本作摸石第二首後闋橫石本作摸石第三首前闋使登榮本作便登榮隨栁岸本作隋岸栁西江月第三首後闋鱸魚本作鱸蓴瑞鷓鴣後闋還過本作還遇江城子第二首後闋歌鐘下本有捲簾風三字蝶戀花後闋闕二字本係黃紙二字臨江仙前闋儒仙本作臞仙第二首後闋闕十二字本作憑誰都卷入芳樽賦歸歡靖節二句醉花隂前闋凍拚萬林梅句本作凍枿萬株梅浪淘沙第二首後闋關燕本作開燕皆可證此本校讐之疏又永樂大典本尚有浣溪沙小飲南鄉子九日虞美人題靈山廣瑞禪院三詞為是刻所無則訛脫又不止字句矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
